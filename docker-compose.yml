services:
  # ============================================
  # MySQL 데이터베이스
  # ============================================
  mysql:
    image: mysql:8.0
    container_name: shopeasy-mysql
    env_file:
      - .env.mysql
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ============================================
  # ShopEasy API 서버
  # ============================================
  api:
    build: .
    container_name: shopeasy-api
    env_file:
      - .env.api
    ports:
      - "5000:5000"
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

# Named Volume 정의
volumes:
  mysql-data: